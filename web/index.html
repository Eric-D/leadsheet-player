<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Lecteur Band-in-a-Box (.MGU / .SGU)</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <meta name="theme-color" content="#1b1b20" />
    <link data-trunk rel="copy-file" href="manifest.json" />
    <link data-trunk rel="copy-file" href="icon.svg" />
    <link data-trunk rel="copy-file" href="service-worker.js" />
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #e8e8ea; }
      /* Leave a right gutter (and respect device safe areas) so content isn't
         flush against the rounded screen edge. */
      canvas {
        position: absolute; top: 0;
        left: env(safe-area-inset-left, 0px);
        width: calc(100% - max(12px, env(safe-area-inset-right, 0px)) - env(safe-area-inset-left, 0px));
        height: 100%;
      }
      #loading {
        position: absolute; inset: 0; display: flex; align-items: center;
        justify-content: center; color: #555; font-family: system-ui, sans-serif;
      }
    </style>
  </head>
  <body>
    <canvas id="the_canvas_id"></canvas>
    <div id="loading">Chargement…</div>
    <div id="update-banner" onclick="location.reload()" style="display:none; position:fixed; top:0; left:0; right:0; z-index:9999; background:#c43c32; color:#fff; font-family:system-ui,sans-serif; font-size:15px; padding:11px 14px; text-align:center; cursor:pointer; box-shadow:0 2px 10px rgba(0,0,0,.35);">
      🔄 Nouvelle version disponible — toucher pour recharger
    </div>
    <script>
      window.addEventListener("DOMContentLoaded", () => {
        const obs = new MutationObserver(() => {});
        // Hide the loading text once the canvas has been painted.
        setTimeout(() => { const l = document.getElementById("loading"); if (l) l.remove(); }, 1500);
      });
    </script>
    <script>
      // Unlock Web Audio on mobile ONCE: the AudioContext (exposed by the app as
      // window.__audioCtx) may only start inside a real user gesture. We resume
      // it on the first interaction, then remove the listeners — otherwise we'd
      // re-resume on every touch and undo Pause (suspend()) immediately.
      (function () {
        var evs = ["touchstart", "touchend", "pointerdown", "mousedown", "click", "keydown"];
        var done = false;
        function unlock() {
          if (done) return;
          var c = window.__audioCtx;
          if (c) {
            try { c.resume(); } catch (e) {}
            done = true;
            evs.forEach(function (ev) { window.removeEventListener(ev, unlock, true); });
          }
        }
        evs.forEach(function (ev) { window.addEventListener(ev, unlock, true); });
      })();
    </script>
    <script>
      // Register the service worker (offline / installable PWA) and surface a
      // "new version available" banner when an update takes over.
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("./service-worker.js").then(function (reg) {
            // A controller change after one already existed = an update landed.
            var hadController = !!navigator.serviceWorker.controller;
            navigator.serviceWorker.addEventListener("controllerchange", function () {
              if (hadController) {
                var b = document.getElementById("update-banner");
                if (b) b.style.display = "block";
              }
            });
            // Poll for a new deploy while the app is open / when it regains focus.
            var check = function () { reg.update().catch(function () {}); };
            setInterval(check, 60000);
            document.addEventListener("visibilitychange", function () {
              if (!document.hidden) check();
            });
          }).catch(function () {});
        });
      }
    </script>
    <script>
      // Local song library backed by IndexedDB — no server, fully offline.
      (function () {
        const DB = "biab", STORE = "songs";
        function open() {
          return new Promise((res, rej) => {
            const r = indexedDB.open(DB, 1);
            r.onupgradeneeded = () => {
              const db = r.result;
              if (!db.objectStoreNames.contains(STORE))
                db.createObjectStore(STORE, { keyPath: "id", autoIncrement: true });
            };
            r.onsuccess = () => res(r.result);
            r.onerror = () => rej(r.error);
          });
        }
        function store(mode) { return open().then(db => db.transaction(STORE, mode).objectStore(STORE)); }
        window.localLib = {
          list: () => store("readonly").then(s => new Promise((res, rej) => {
            const out = [], c = s.openCursor();
            c.onsuccess = () => {
              const cur = c.result;
              if (cur) { const v = cur.value; out.push({ id: v.id, name: v.name, title: v.title, key: v.key, tempo: v.tempo, style: v.style }); cur.continue(); }
              else res(out);
            };
            c.onerror = () => rej(c.error);
          })),
          get: (id) => store("readonly").then(s => new Promise((res, rej) => {
            const r = s.get(id);
            r.onsuccess = () => res(r.result ? r.result.bytes : new Uint8Array());
            r.onerror = () => rej(r.error);
          })),
          save: (name, bytes, title, key, tempo, style) => store("readwrite").then(s => new Promise((res, rej) => {
            const r = s.add({ name, bytes, title, key, tempo, style, createdAt: Date.now() });
            r.onsuccess = () => res(r.result);
            r.onerror = () => rej(r.error);
          })),
          remove: (id) => store("readwrite").then(s => new Promise((res, rej) => {
            const r = s.delete(id);
            r.onsuccess = () => res(true);
            r.onerror = () => rej(r.error);
          })),
          rename: (id, title) => store("readwrite").then(s => new Promise((res, rej) => {
            const g = s.get(id);
            g.onsuccess = () => {
              const v = g.result; if (!v) { res(false); return; }
              v.title = title; const p = s.put(v);
              p.onsuccess = () => res(true); p.onerror = () => rej(p.error);
            };
            g.onerror = () => rej(g.error);
          })),
        };
      })();
    </script>
    <script>
      // One-step file open: a native <input type=file>, clicked straight away
      // (within the tap's transient activation) — no extra "Ok" modal like rfd.
      // The picked file lands in window.__pickedFile; the app polls it.
      window.__openFile = function () {
        var input = document.createElement("input");
        input.type = "file";
        input.onchange = function () {
          var f = input.files && input.files[0];
          if (!f) return;
          f.arrayBuffer().then(function (buf) {
            window.__pickedFile = { name: f.name, bytes: new Uint8Array(buf) };
          });
        };
        input.click();
      };
      window.__takePicked = function () {
        var p = window.__pickedFile || null;
        window.__pickedFile = null;
        return p;
      };
    </script>
    <script>
      // Cloud "space": the QR/URL carries the whole config (Supabase URL + anon
      // key + space key). The app is generic; the space is a single JSON blob
      // keyed by the space key, stored in the user's own Supabase. The local
      // IndexedDB library is the working copy / offline cache.
      (function () {
        const DB = "biab", STORE = "songs";
        function open() {
          return new Promise((res, rej) => {
            const r = indexedDB.open(DB, 1);
            r.onupgradeneeded = () => { const db = r.result; if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE, { keyPath: "id", autoIncrement: true }); };
            r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
          });
        }
        function store(mode) { return open().then(db => db.transaction(STORE, mode).objectStore(STORE)); }
        function b64enc(u8) { let s = ""; for (let i = 0; i < u8.length; i += 0x8000) s += String.fromCharCode.apply(null, u8.subarray(i, i + 0x8000)); return btoa(s); }
        function b64dec(b) { const s = atob(b), u = new Uint8Array(s.length); for (let i = 0; i < s.length; i++) u[i] = s.charCodeAt(i); return u; }
        function allSongs() {
          return store("readonly").then(s => new Promise((res, rej) => {
            const out = [], c = s.openCursor();
            c.onsuccess = () => { const cur = c.result; if (cur) { const v = cur.value; out.push({ name: v.name, title: v.title, key: v.key, tempo: v.tempo, style: v.style, b64: b64enc(v.bytes instanceof Uint8Array ? v.bytes : new Uint8Array(v.bytes)) }); cur.continue(); } else res(out); };
            c.onerror = () => rej(c.error);
          }));
        }
        function haveTitles() {
          return store("readonly").then(s => new Promise((res, rej) => {
            const set = {}, c = s.openCursor();
            c.onsuccess = () => { const cur = c.result; if (cur) { set[(cur.value.title || cur.value.name)] = 1; cur.continue(); } else res(set); };
            c.onerror = () => rej(c.error);
          }));
        }
        function addSong(g) {
          return store("readwrite").then(s => new Promise((res, rej) => {
            const r = s.add({ name: g.name, bytes: b64dec(g.b64), title: g.title, key: g.key, tempo: g.tempo, style: g.style, createdAt: Date.now() });
            r.onsuccess = () => res(true); r.onerror = () => rej(r.error);
          }));
        }
        function rpc(url, anon, fn, body) {
          return fetch(url.replace(/\/+$/, "") + "/rest/v1/rpc/" + fn, {
            method: "POST",
            headers: { apikey: anon, Authorization: "Bearer " + anon, "Content-Type": "application/json" },
            body: JSON.stringify(body),
          }).then(function (r) { return r.ok ? r.json() : Promise.reject("HTTP " + r.status); });
        }
        window.cloud = {
          // Upload the whole local library to the space.
          push: function (url, anon, space) {
            return allSongs().then(function (songs) { return rpc(url, anon, "space_save", { k: space, d: songs }).then(function () { return songs.length; }); });
          },
          // Download the space's songs into the local library (skip titles we already have).
          pull: function (url, anon, space) {
            return rpc(url, anon, "space_get", { k: space }).then(function (data) {
              if (!Array.isArray(data)) return 0;
              return haveTitles().then(function (have) {
                var chain = Promise.resolve(), n = 0;
                data.forEach(function (g) { var t = g.title || g.name; if (!have[t]) { chain = chain.then(function () { return addSong(g); }); n++; } });
                return chain.then(function () { return n; });
              });
            });
          },
        };
        // Config persistence (localStorage) — stored as a JSON string.
        window.cloudCfg = {
          load: function () { return localStorage.getItem("cloudCfg") || ""; },
          save: function (s) { try { localStorage.setItem("cloudCfg", s); } catch (e) {} },
        };
      })();
    </script>
    <link data-trunk rel="rust" data-bin="biab-web" data-wasm-opt="z" />
  </body>
</html>
