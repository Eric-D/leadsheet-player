name: Deploy to GitHub Pages

# Two channels in one Pages site:
#   - stable (release) from `main` -> /<repo>/
#   - dev                from `dev`  -> /<repo>/dev/
# Every push (to either branch) rebuilds BOTH from their current branch state,
# because the Pages artifact replaces the whole site on each deploy.
on:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout stable (main)
        uses: actions/checkout@v4
        with:
          ref: main
          path: stable

      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev
          path: dev

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: Install trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      - name: Build stable -> /<repo>/
        run: |
          SHA=$(git -C stable rev-parse --short HEAD)
          cd stable/web
          export BUILD_INFO="$(date -u +%Y-%m-%d\ %H:%M) ${SHA} (release)"
          trunk build --release --public-url "/${GITHUB_REPOSITORY#*/}/" --dist "$GITHUB_WORKSPACE/_site"

      - name: Build dev -> /<repo>/dev/
        run: |
          SHA=$(git -C dev rev-parse --short HEAD)
          cd dev/web
          export BUILD_INFO="$(date -u +%Y-%m-%d\ %H:%M) ${SHA} (dev)"
          trunk build --release --public-url "/${GITHUB_REPOSITORY#*/}/dev/" --dist "$GITHUB_WORKSPACE/_site/dev"

      - name: No Jekyll
        run: touch "$GITHUB_WORKSPACE/_site/.nojekyll"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
